{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-[#111827] p-6 rounded-2xl border border-zinc-800 shadow-xl">
    <h2 class="text-xl font-bold text-white mb-1">Adquirir Activos</h2>
    <p class="text-xs text-zinc-400 mb-5">Las acciones se agruparán dentro del portafolio que elijas.</p>
    
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-xs text-zinc-500 font-bold uppercase mb-2">Asignar a Portafolio</label>
            <select name="portafolio" required class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-white focus:outline-none focus:border-yellow-500">
                {% for p_nombre in portfolios.keys() %}
                    <option value="{{ p_nombre }}">{{ p_nombre }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-xs text-zinc-500 font-bold uppercase mb-2">Empresa o Símbolo</label>
            <input type="text" name="simbolo" required placeholder="Ej: AAPL" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-white placeholder-zinc-600 focus:outline-none focus:border-yellow-500">
        </div>

        <div>
            <label class="block text-xs text-zinc-500 font-bold uppercase mb-2">Cantidad de Títulos</label>
            <input type="number" name="cantidad" min="1" required placeholder="0" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-white placeholder-zinc-600 focus:outline-none focus:border-yellow-500">
        </div>

        <button type="submit" class="w-full bg-emerald-500 text-neutral-950 font-bold p-3 rounded-xl hover:bg-emerald-400 transition pt-3">Ejecutar Compra</button>
    </form>
</div>
{% endblock %}
